<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Random Cat Viewer</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Anderson Lang</h1>
    <h1>Computer Science Principles</h1>
    <div class="container">
      <h1>Random Cat Viewer</h1>
      <div id="image-generator" class="image-wrapper">
        <img id="cat-image" src="" alt="Random cat" />
      </div>
      <button id="generate-btn">Generate New Cat</button>
      <p id="status-message" aria-live="polite"></p>
    </div>

    <div class="chat-container">
      <h2>Chat with the Cat</h2>
      <div id="chat-messages"></div>
      <div class="chat-input">
        <input id="chat-input" type="text" placeholder="Type your message..." />
        <button id="send-btn">Send</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
